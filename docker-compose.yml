services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oil-analysis-dashboard
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8050
      - DATA_ROOT=/data/oil
    volumes:
      - ./data:/data:ro
      - ./logs:/app/logs
      - ./dashboard:/app/dashboard
      - ./config:/app/config
      - ./src:/app/src
    ports:
      - "8050:8050"
    restart: unless-stopped