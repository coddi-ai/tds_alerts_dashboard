services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oil-analysis-dashboard
    env_file:
      - .env  # Load environment variables from .env file
    environment:
      # Override specific variables if needed
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8050
      # MAPBOX_TOKEN will be read from .env file
      # Or set explicitly: MAPBOX_TOKEN=${MAPBOX_TOKEN}
    volumes:
      - ./data:/data:ro
      - ./logs:/app/logs
      - ./dashboard:/app/dashboard
      - ./config:/app/config
      - ./src:/app/src
    ports:
      - "8050:8050"
    restart: unless-stopped